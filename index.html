<!DOCTYPE html>
<html>
    <head>
        <meta name="mobile-web-app-capable" content="yes">
        <script src="/socket.io/socket.io.js"></script>
        <script src="/piecon.js"></script>
        <script>
            
            // Admin password check
            var adminMode = (window.location.pathname == "/admin");
            if (adminMode) {
                var pwd = prompt("Enter admin password:");
                if (pwd !== "admin123") {
                    alert("Incorrect password!");
                    window.location.href = "/";
                }
            }
            
            var socket = io();
            var t = 15;
            var i = t;
            var key = "";
            var successToken = "";
            var targetTime = null;  // Timestamp-based timer

            socket.emit("sync");
            
            Piecon.setOptions({color: '#999999'});

            setInterval(function () {
                
                timerDiv = document.getElementById("timer");
                
                // Calculate time from targetTime timestamp instead of decrementing
                if (targetTime) {
                    t = Math.max(0, Math.ceil((targetTime - Date.now()) / 1000));
                }
                
                var minutes = Math.floor(Math.abs(t)/60);
                var seconds = Math.round((Math.abs(t) - minutes*60));

                var timeLeft = ((t<0)?"-":"")+
                    minutes+":"+
                    ((seconds<10)?"0"+seconds:seconds);
                

                timerDiv.innerText = timeLeft;
                window.document.title = timeLeft + " 🙂";
                
                
                
                var progress = t/i*100;
                document.getElementById("prog").style["width"] = progress+"%";
                
                Piecon.setProgress(100 - progress);

                var baseProgressClassName = "progress-bar progress-bar-striped progress-bar-animated";
                               
                // Default style
                var backColor = 'black';
                var fontColor = 'white';
                var progressClassName = baseProgressClassName;
                var pieconColor = '#1177ff';

                if ( ( progress <= 20 ) && (progress>0) && t>0 ) {
                    // < 20% Style
                    window.document.title = timeLeft + " 😨";
                    fontColor = 'black';
                    backColor = '#ffbf00';      
                    progressClassName = baseProgressClassName + ' bg-danger';
                    pieconColor = '#ffbb44';

                } else if( t <= 0 ) {
                    // Out of time! Style
                    window.document.title = timeLeft + " 😖";
                    fontColor = 'black';
                    backColor = '#e60000';
                    progressClassName = baseProgressClassName + ' bg-danger';
                    document.getElementById("prog").style["width"] = "100%";
                    pieconColor = '#ff1111';
                
                }
                
                document.body.style["color"] = fontColor;
                document.body.style["background-color"] = backColor;

                document.getElementById("prog").className = progressClassName;

                Piecon.setOptions({color: pieconColor});

                if (adminMode)
                    window.document.title = timeLeft + " 😎";
                
            },1000);


            socket.on('reset', (msg) => {
                    console.log('Reset ' + msg.data);
                    t = msg.data;
                    i = t;
                    // Store targetTime for timestamp-based calculation
                    if (msg.targetTime) {
                        targetTime = msg.targetTime;
                    } else {
                        // Fallback: calculate targetTime from data if server doesn't send it
                        targetTime = Date.now() + (msg.data * 1000);
                    }
            });

            // Periodic sync-check for auto-correction
            socket.on('sync-check', (msg) => {
                if (msg.targetTime) {
                    // Only update if drift is significant (> 2 seconds)
                    const currentCalc = Math.max(0, Math.ceil((targetTime - Date.now()) / 1000));
                    const serverTime = msg.timeRemaining;
                    if (Math.abs(currentCalc - serverTime) > 2) {
                        console.log('Sync correction: ' + currentCalc + ' -> ' + serverTime);
                        targetTime = msg.targetTime;
                        t = serverTime;
                    }
                }
            });


            function plus(extra){
                
                console.log("Adding time: +"+extra+" seconds");
                socket.emit("addTime", {
                    key: key,
                    data: extra
                });

            }

            function reset(){
                var minReset = document.getElementById("minReset").value;
                console.log("mr "+minReset+ " -> "+(isNaN(minReset)));
                
                if (isNaN(minReset) || (!minReset) || (minReset == "")) {
                    document.getElementById("minReset").style["color"] = "red";
                    return;
                }
                document.getElementById("minReset").style["color"] = "black";

                console.log("mr "+minReset+ " -> "+(isNaN(minReset)));
                

                var tReset = minReset*60;
                
                socket.emit("reset", {
                    key: key,
                    data: tReset
                });
            }

            function setKey(){
              
                var newKey = document.getElementById("inputKey").value;
        
                successToken = Math.random().toString(36).substring(2,10);
                console.log("setKey: <"+newKey+"> and st = ["+successToken+"]");

                socket.emit("setKey", {
                    key: key,
                    newKey: newKey,
                    successToken : successToken
                });

            }

            function showInfo(msg){
                document.getElementById("alertInfo").innerHTML = msg;
                document.getElementById("alertInfo").style.display = "block";
                setTimeout(function (){
                    document.getElementById("alertInfo").style.display = "none";
                },2000);

            }


            socket.on('keyCleared', () => {
                key = "";
                document.getElementById("keyPanel").style.display = "none";
                document.getElementById("inputKey").value = "";
                showInfo("Admin Key has been cleared!");
            });


            socket.on('keyChanged', (msg) => {
                    var newKey = document.getElementById("inputKey").value;
                    console.log("keyChanged with st = [" + msg.successToken+"], my st = ["+successToken+"]");
                    if (successToken == msg.successToken){
                        key = newKey;
                        document.getElementById("inputKey").value = "";
                        document.getElementById("currentKey").innerText = key;                
                        document.getElementById("keyPanel").style.display = "block";
                        showInfo("You have changed the key!");
                    }else{
                        document.getElementById("keyPanel").style.display = "none";
                        showInfo("Somebody changed the key!");
                    }
                        
            });

            socket.on('keyUnchanged', (msg) => {
                    console.log("keyUnchanged with st = [" + msg.successToken+"]");
                    if (successToken == msg.successToken){
                        showInfo("FORBIDDEN: Key Already set!");
                    }else{
                        showInfo("Somebody TRIED to change the key!");   
                    }
                        
                    
            });

            


            function sendclick(event) {
                if (event.keyCode === 13) {
                    event.preventDefault();
                    document.getElementById("btnReset").click();
                }
            }
            socket.on('connect', function () {
                socket.emit("sync");
                document.getElementById("alertDisconnect").style.display = "none";
                document.getElementById("alertConnect").style.display = "block";
                document.getElementsByClassName("adminControls")[0].style["pointer-events"] = "auto";
                document.getElementsByClassName("adminControls")[1].style["pointer-events"] = "auto";

                setTimeout(function (){
                    document.getElementById("alertConnect").style.display = "none";
                },2000);
            });

            socket.on('disconnect', function () {
                document.getElementsByClassName("adminControls")[0].style["pointer-events"] = "none";
                document.getElementsByClassName("adminControls")[1].style["pointer-events"] = "none";
                document.getElementById("alertDisconnect").style.display = "block";
                
            });


        </script>  
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">    
        <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
        <style>
            body {
                margin: 0;
                padding: 0;
                overflow: hidden;
            }
            .admin-card {
                background: rgba(255, 255, 255, 0.95);
                border-radius: 10px;
                padding: 8px 15px;
                margin: 5px auto;
                max-width: 700px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
                backdrop-filter: blur(10px);
            }
            .admin-card-title {
                font-weight: bold;
                font-size: 0.9em;
                margin-bottom: 8px;
                color: #333;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 5px;
            }
            .btn-group-custom {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 5px;
                margin: 5px 0;
            }
            .btn-custom {
                min-width: 60px;
                padding: 6px 12px;
                font-size: 0.85em;
                font-weight: 600;
                border-radius: 6px;
                transition: all 0.2s ease;
                border: 2px solid currentColor;
            }
            .btn-custom:hover {
                transform: translateY(-1px);
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            }
            .reset-group {
                display: flex;
                gap: 8px;
                align-items: center;
                justify-content: center;
            }
            #minReset {
                font-size: 1.1em;
                text-align: center;
                max-width: 80px;
                border-radius: 6px;
                border: 2px solid #17a2b8;
                padding: 6px 10px;
            }
            #btnReset {
                font-size: 1em;
                padding: 6px 20px;
                border-radius: 6px;
                font-weight: bold;
            }
            .key-section {
                margin-top: 8px;
                padding-top: 8px;
                border-top: 1px dashed rgba(0,0,0,0.1);
            }
            #keyPanel {
                margin-top: 6px;
                padding: 6px;
                background: #e7f5ff;
                border-radius: 6px;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 6px;
                font-size: 0.85em;
            }
            .admin-badge {
                display: inline-block;
                padding: 2px 8px;
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                color: white;
                border-radius: 5px;
                font-size: 0.7em;
                font-weight: bold;
                position: fixed;
                top: 10px;
                right: 10px;
                z-index: 1000;
                box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            }
            .footer {
                z-index: -1 !important;
            }
        </style>
    </head>
    <body style="font-family: 'Roboto Mono', monospace; text-align: center;">
        <div class="admin-badge" style="display: none;">🔑 ADMIN MODE</div>
        <div class="progress" style="height: 8px;">
            <div id="prog" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100" style="width: 0%"></div>
        </div>
        
        <div class="adminControls" style="display: none;">
            <div class="admin-card">
                <div class="admin-card-title">
                    <span>⏱️</span> Reset Timer
                </div>
                <div class="reset-group">
                    <input id="minReset" class="form-control" placeholder="Min" onkeyup="sendclick(event)" type="number" min="0" max="999">    
                    <button id="btnReset" class="btn btn-info btn-custom" onclick="reset()">🔄 Reset</button>
                </div>
            </div>
        </div>
        
        <div id="timer" style="font-size:18vw;margin: 5px 0;" >
        -:--
        </div>  
        
        <div class="adminControls" style="display: none;">
            <div class="admin-card">
                <div class="admin-card-title">
                    <span>➕</span> Add Time (Minutes)
                </div>
                <div class="btn-group-custom">
                    <button class="btn btn-success btn-custom" onClick="plus(60)">+1 min</button>
                    <button class="btn btn-success btn-custom" onClick="plus(120)">+2 min</button>
                    <button class="btn btn-success btn-custom" onClick="plus(180)">+3 min</button>
                    <button class="btn btn-success btn-custom" onClick="plus(240)">+4 min</button>
                    <button class="btn btn-success btn-custom" onClick="plus(300)">+5 min</button>
                </div>
                <div class="admin-card-title" style="font-size: 0.85em; margin-top: 5px;">
                    <span>⏰</span> Add Time (Seconds)
                </div>
                <div class="btn-group-custom">
                    <button class="btn btn-warning btn-custom" onClick="plus(5)">+5s</button>
                    <button class="btn btn-warning btn-custom" onClick="plus(10)">+10s</button>
                    <button class="btn btn-warning btn-custom" onClick="plus(15)">+15s</button>
                    <button class="btn btn-warning btn-custom" onClick="plus(30)">+30s</button>
                    <button class="btn btn-warning btn-custom" onClick="plus(45)">+45s</button>
                </div>
            </div>
        </div>
        
        <div class="adminControls" style="display: none;">
            <div class="admin-card">
                <div class="admin-card-title">
                    <span>🔐</span> Security Key
                </div>
                <div class="reset-group">
                    <input id="inputKey" class="form-control" placeholder="Admin Key" style="max-width: 150px; border-radius: 6px; font-size: 0.9em; padding: 6px 10px;">    
                    <button id="btnSetKey" class="btn btn-secondary btn-custom" onclick="setKey()">🔑 Set</button>
                </div>
                <div id="keyPanel" class="key-section" style="display: none;">
                    <strong style="font-size: 0.85em;">Key:</strong> <span id="currentKey" style="font-family: monospace; background: #fff; padding: 3px 8px; border-radius: 4px; font-size: 0.85em;"></span>
                </div>
                <div id="alertInfo" class="alert alert-info" style="font-size: small; display:none; margin-top: 8px; border-radius: 6px; padding: 8px;" role="alert">
                </div>
            </div>
        </div>
        
        <div id="alertDisconnect" class="alert alert-danger" style="font-size: small; display:none; position: fixed; top: 30px; left: 50%; transform: translateX(-50%); z-index: 999; min-width: 250px; padding: 8px 12px; border-radius: 8px; box-shadow: 0 3px 10px rgba(0,0,0,0.3);" role="alert">
            ⚠️ Disconnected from server
        </div>
        <div id="alertConnect" class="alert alert-success" style="font-size: small; display:none; position: fixed; top: 30px; left: 50%; transform: translateX(-50%); z-index: 999; min-width: 200px; padding: 8px 12px; border-radius: 8px; box-shadow: 0 3px 10px rgba(0,0,0,0.3);" role="alert">
            ✅ Connected
        </div>


    </body>
    <script>
        if (adminMode){
            document.getElementsByClassName("adminControls")[0].style.display = "block";
            document.getElementsByClassName("adminControls")[1].style.display = "block";
            document.getElementsByClassName("adminControls")[2].style.display = "block";
            document.querySelector(".admin-badge").style.display = "inline-block";
        }
        document.getElementById("keyPanel").style.display = "none";
    </script>
<span class="footer" style="font-size: x-small; text-align: center; color:#aaa; position:fixed; width:100%; height: 2rem; left: 0; bottom: 0; z-index: -1; pointer-events: none;">

</span>
    
</html>
